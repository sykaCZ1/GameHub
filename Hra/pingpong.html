<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Ping Pong</title>

<style>

body{
margin:0;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

canvas{
background:#020617;
border:3px solid #38bdf8;
}

.score{
margin-top:10px;
font-size:20px;
}

.sets{
font-size:18px;
margin-top:5px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🏓 Ping Pong</h1>

<canvas id="game" width="600" height="400"></canvas>

<div class="score">
Body: Ty <span id="playerScore">0</span> |
Počítač <span id="aiScore">0</span>
</div>

<div class="sets">
Sety: Ty <span id="playerSets">0</span> |
Počítač <span id="aiSets">0</span>
</div>

<button onclick="location.href='index.html'">Zpět</button>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let player={x:10,y:150,width:10,height:80,speed:6}
let ai={x:580,y:150,width:10,height:80}

let ball={x:300,y:200,size:10,speedX:4,speedY:4}

let playerScore=0
let aiScore=0

let playerSets=0
let aiSets=0

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function resetBall(){
ball.x=canvas.width/2
ball.y=canvas.height/2
ball.speedX*=-1
}

function checkSet(){

if(
(playerScore>=11 || aiScore>=11) &&
Math.abs(playerScore-aiScore)>=2
){

if(playerScore>aiScore){
playerSets++
}else{
aiSets++
}

playerScore=0
aiScore=0

}

if(playerSets===2 || aiSets===2){

setTimeout(()=>{

if(playerSets>aiSets){
alert("Vyhrál jsi zápas!")
}else{
alert("Vyhrál počítač!")
}

playerSets=0
aiSets=0
playerScore=0
aiScore=0

},100)

}

}

function update(){

if(keys["ArrowUp"]) player.y-=player.speed
if(keys["ArrowDown"]) player.y+=player.speed

player.y=Math.max(0,Math.min(canvas.height-player.height,player.y))

ai.y += (ball.y-(ai.y+ai.height/2))*0.08

ball.x+=ball.speedX
ball.y+=ball.speedY

if(ball.y<0 || ball.y>canvas.height-ball.size){
ball.speedY*=-1
}

if(
ball.x<player.x+player.width &&
ball.y<player.y+player.height &&
ball.y+ball.size>player.y
){
ball.speedX*=-1
}

if(
ball.x+ball.size>ai.x &&
ball.y<ai.y+ai.height &&
ball.y+ball.size>ai.y
){
ball.speedX*=-1
}

if(ball.x>canvas.width){
playerScore++
resetBall()
checkSet()
}

if(ball.x<0){
aiScore++
resetBall()
checkSet()
}

document.getElementById("playerScore").innerText=playerScore
document.getElementById("aiScore").innerText=aiScore

document.getElementById("playerSets").innerText=playerSets
document.getElementById("aiSets").innerText=aiSets

}

function draw(){

ctx.fillStyle="#020617"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

ctx.fillRect(player.x,player.y,player.width,player.height)
ctx.fillRect(ai.x,ai.y,ai.width,ai.height)

ctx.fillRect(ball.x,ball.y,ball.size,ball.size)

for(let i=0;i<canvas.height;i+=20){
ctx.fillRect(canvas.width/2-1,i,2,10)
}

}

function gameLoop(){
update()
draw()
requestAnimationFrame(gameLoop)
}

gameLoop()

</script>

</body>
</html>
