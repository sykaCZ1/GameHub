<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Candy Match</title>
<style>
body{
margin:0;
background:linear-gradient(180deg,#1e293b,#0f172a);
font-family:Arial;
color:white;
text-align:center;
}

h1{margin:15px;}

#scoreBoard{
font-size:20px;
margin-bottom:10px;
color:#facc15;
}

.grid{
display:grid;
grid-template-columns:repeat(8,70px);
gap:6px;
justify-content:center;
margin-top:10px;
}

.candy{
width:70px;
height:70px;
border-radius:18px;
cursor:pointer;
transition:0.2s;
box-shadow:inset 0 -4px rgba(0,0,0,0.2);
}

.candy:hover{transform:scale(1.08);}

.selected{
outline:4px solid white;
transform:scale(1.1);
}

.red{background:#ef4444;}
.blue{background:#3b82f6;}
.green{background:#22c55e;}
.yellow{background:#facc15;}
.purple{background:#a855f7;}
.orange{background:#f97316;}

button{
margin-top:15px;
padding:8px 16px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<h1>🍬 Candy Match</h1>
<div id="scoreBoard">Body: <span id="score">0</span> | Rekord: <span id="high">0</span></div>
<div class="grid" id="grid"></div>

<button onclick="location.reload()">🔄 Restart</button>
<button onclick="goMenu()">⬅️ Menu</button>

<script>
const size=8;
const colors=["red","blue","green","yellow","purple","orange"];
let board=[];
let score=0;
let high=localStorage.getItem("candyHigh")||0;
document.getElementById("high").innerText=high;

const grid=document.getElementById("grid");
let selected=null;

function randomCandy(){
return colors[Math.floor(Math.random()*colors.length)];
}

function createBoard(){
for(let i=0;i<size*size;i++){
let c=randomCandy();
board.push(c);
let div=document.createElement("div");
div.className="candy "+c;
div.dataset.index=i;
div.onclick=()=>selectCandy(div);
grid.appendChild(div);
}
}

function selectCandy(div){
if(selected===div){
div.classList.remove("selected");
selected=null;
return;
}
if(!selected){
selected=div;
div.classList.add("selected");
}else{
swap(selected,div);
selected.classList.remove("selected");
selected=null;
}
}

function swap(a,b){
let ia=a.dataset.index;
let ib=b.dataset.index;
[board[ia],board[ib]]=[board[ib],board[ia]];
updateBoard();
setTimeout(checkMatches,200);
}

function updateBoard(){
document.querySelectorAll(".candy").forEach((d,i)=>{
d.className="candy "+board[i];
});
}

function checkMatches(){
let matched=[];
for(let r=0;r<size;r++){
for(let c=0;c<size-2;c++){
let i=r*size+c;
let color=board[i];
if(color && color===board[i+1] && color===board[i+2]){
matched.push(i,i+1,i+2);
}
}
}
for(let c=0;c<size;c++){
for(let r=0;r<size-2;r++){
let i=r*size+c;
let color=board[i];
if(color && color===board[i+size] && color===board[i+2*size]){
matched.push(i,i+size,i+2*size);
}
}
}
matched=[...new Set(matched)];
if(matched.length){
matched.forEach(i=>board[i]=null);
score+=matched.length*5;
dropCandies();
}
updateScore();
}

function dropCandies(){
for(let c=0;c<size;c++){
for(let r=size-1;r>=0;r--){
let i=r*size+c;
if(board[i]===null){
for(let k=r-1;k>=0;k--){
let j=k*size+c;
if(board[j]!==null){
board[i]=board[j];
board[j]=null;
break;
}
}
if(board[i]===null) board[i]=randomCandy();
}
}
}
updateBoard();
setTimeout(checkMatches,200);
}

function updateScore(){
document.getElementById("score").innerText=score;
if(score>high){
high=score;
localStorage.setItem("candyHigh",high);
document.getElementById("high").innerText=high;
}
}

function goMenu(){ window.location.href="index.html"; }

createBoard();
</script>

</body>
</html>
